services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: finwise
      POSTGRES_USER: finwise
      POSTGRES_PASSWORD: finwise
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finwise -d finwise"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finwise-net

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://finwise:finwise@db:5432/finwise
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ALLOW_ORIGINS: '["http://localhost:13000"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18000:8000"
    networks:
      - finwise-net

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:18000
    ports:
      - "13000:3000"
    depends_on:
      - api
    networks:
      - finwise-net

volumes:
  db-data:

networks:
  finwise-net:
    driver: bridge
